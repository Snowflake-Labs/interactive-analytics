spec:
  containers:
    - name: benchmark
      image: /${DB}/${SCHEMA}/${IMAGE_REPO}/${DASHBOARD_IMAGE}:${IMAGE_TAG}
      env:
        PORT: "${DASHBOARD_PORT}"
        SNOWFLAKE_DATABASE: "${DASHBOARD_DATABASE}"
        STANDARD_WAREHOUSE: "${STANDARD_WAREHOUSE}"
        STANDARD_SCHEMA: "${STANDARD_SCHEMA}"
        INTERACTIVE_WAREHOUSE: "${INTERACTIVE_WAREHOUSE}"
        INTERACTIVE_SCHEMA: "${INTERACTIVE_SCHEMA}"
      resources:
        requests:
          memory: 1Gi
          cpu: "500m"
        limits:
          memory: 2Gi
          cpu: "1000m"
      readinessProbe:
        port: ${DASHBOARD_PORT}
        path: /api/standard
  endpoints:
    - name: api
      port: ${DASHBOARD_PORT}
      public: true
      protocol: HTTP
